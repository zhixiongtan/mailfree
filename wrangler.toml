name = "mailfree"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "bc3f60ce-1b47-43ea-84f0-41fd5f982693" # 你的database_id
# 登录会话过期时间（单位：天，默认365天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"2141083706@qq.com"}]"
ADMIN_NAME="eric"
ADMIN_PASSWORD="mko0(IJNmko0(IJN"
GUEST_PASSWORD="guest"
JWT_TOKEN="ieruodjfskdf"
JWT_TOKENGUEST_PASSWORD="dfsfjlisejflsalsdhfsjkfjdaw"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="test.domain"
RESEND_API_KEY="mko0(IJNmko0(IJN"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

